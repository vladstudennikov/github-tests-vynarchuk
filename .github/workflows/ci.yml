name: CI-CD Pipeline

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest tests/test_service.py

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create build artifact
        run: |
          mkdir -p build
          echo "Build artifact for commit: $GITHUB_SHA" > build/artifact.txt
          echo "Build time: $(date)" >> build/artifact.txt
          echo "Files in project:" >> build/artifact.txt
          ls -la >> build/artifact.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: build/artifact.txt

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    environment: staging

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact
          path: build

      - name: Simulate deploy to staging
        run: |
          echo "Deploying to staging..."
          cat build/artifact.txt
          echo "Staging deployment completed"

  verify_staging:
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: github.event_name == 'push'

    steps:
      - name: Run smoke test
        run: pytest tests/test_smoke.py

  deploy_production:
    runs-on: ubuntu-latest
    needs: verify_staging
    if: github.event_name == 'push'

    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-artifact
          path: build

      - name: Simulate deploy to production
        run: |
          echo "Deploying to production..."
          cat build/artifact.txt
          echo "Production deployment completed"